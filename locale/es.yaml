    insight_shared_many: '<strong>$1</strong> y <strong>$2</strong> comparten los
      primos <strong>$7</strong>. El MCD toma solo los bloques verdes compartidos.
      El MCM toma todos los bloques — verdes compartidos, azules adicionales de A,
      rojos adicionales de B — sin contar ningún primo dos veces. Siempre es cierto:
      <strong>$1 × $2 = $5</strong> = MCD × MCM = <strong>$3 × $4 = $6</strong>.'
