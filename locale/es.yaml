      Fórmula: A = base × altura
      base (AB) = $1 cm
      altura = $2 cm
      = $1 × $2
    areaRectangle: |-
      Fórmula: A = base × altura
      = $1 × $2
    areaSquare: |-
      Fórmula: A = lado²
      = $1²
    areaTrapezoid: |-
      Fórmula: A = (b₁ + b₂) / 2 × h
      b₁ (AB) = $1 cm
      b₂ (CD) = $2 cm
      altura = $3 cm
      = ($1 + $2) / 2 × $3
