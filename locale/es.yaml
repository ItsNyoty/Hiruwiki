      Fórmula de Gauss (shoelace):
      A = ½ |Σ(xᵢ·yᵢ₊₁ − xᵢ₊₁·yᵢ)|
    areaGaussSum: |2-
      Σ = $1
      A = ½ × |$1|
    areaGaussTerm: '  (x$1·y$2 − x$2·y$1) = $3'
