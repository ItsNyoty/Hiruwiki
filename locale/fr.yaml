      d₂ (BD) = $2 cm
      = ($1 × $2) / 2
    areaGaussHeader: |-
      Formule de Gauss (shoelace) :
      A = ½ |Σ(xᵢ·yᵢ₊₁ − xᵢ₊₁·yᵢ)|
    areaGaussSum: |2-
      Σ = $1
      A = ½ × |$1|
    areaGaussTerm: '  (x$1·y$2 − x$2·y$1) = $3'
    areaParallelogram: |-
      Formule : A = base × hauteur
      base (AB) = $1 cm
      hauteur = $2 cm
      = $1 × $2
    areaRectangle: |-
      Formule : A = largeur × hauteur
      = $1 × $2
    areaSquare: |-
      Formule : A = côté²
      = $1²
    areaTrapezoid: |-
      Formule : A = (b₁ + b₂) / 2 × h
      b₁ (AB) = $1 cm
      b₂ (CD) = $2 cm
      hauteur = $3 cm
      = ($1 + $2) / 2 × $3
