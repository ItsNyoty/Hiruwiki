      = <strong>1 × $4 = $4</strong>.'
    insight_shared_many: '<strong>$1</strong> et <strong>$2</strong> partagent les
      nombres premiers <strong>$7</strong>. Le PGCD ne prend que les blocs verts
      partagés. Le PPCM prend tous les blocs — verts partagés, bleus de A, rouges
      de B — sans compter aucun nombre premier deux fois. Toujours vrai : <strong>$1
      × $2 = $5</strong> = PGCD × PPCM = <strong>$3 × $4 = $6</strong>.'
    insight_shared_one: '<strong>$1</strong> et <strong>$2</strong> partagent le
      nombre premier <strong>$7</strong>. Le PGCD ne prend que les blocs verts
