name: Deploy to MediaWiki

on:
  push:
    branches:
      - main
    paths:
      - 'Gadget-hiruwiki-core.js'
      - 'banana-i18n.js'
      - 'modules/**'
      - 'deploy.py'
  workflow_dispatch:
    inputs:
      site:
        description: 'Wiki site shorthand (e.g., mediawiki, testwiki, enwiki)'
        required: true
        default: 'mediawiki'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.actor == 'translatewiki') ||
      (github.event_name == 'workflow_dispatch' && (github.actor == 'ItsNyoty' || github.actor == 'theklan'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # PyYAML is optional in deploy.py but good to have if i18n.yaml exists
          pip install PyYAML

      - name: Build i18n
        run: python build_i18n.py

      - name: Commit and push build changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add modules/*.js
          if ! git diff --cached --quiet; then
            git commit -m "Build: Update translations in modules [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Run deployment script
        env:
          ALLOW_DIRTY_REPO: 1
        run: |
          python deploy.py \
            --yes \
            --create \
            --dry \
            --site "${{ github.event.inputs.site || secrets.WIKI_API_URL }}" \
            --username "${{ secrets.WIKI_USERNAME }}" \
            --password "${{ secrets.WIKI_PASSWORD }}"
